<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="theme-color" content="#141b30" />
  <link rel="manifest" href="manifest.json" />
  <title>Spin Sumo | Beyblade Arena</title>
  <link rel="stylesheet" href="css/game.css?v=17" />
</head>
<body class="mobile">

  <div id="orientation-lock" class="orientation-lock" aria-live="polite">
    <div class="orientation-lock-card">
      <div class="orientation-lock-icon" aria-hidden="true">↻</div>
      <p>Rotate your phone to portrait to play</p>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="top-chrome" class="top-chrome">
    <div id="hud">
      <div class="hud-panel">
        <img class="hud-avatar" id="player-avatar" src="updatedLdragoLogo.png" alt="" />
        <div class="hud-info">
          <div class="hud-label">You · Spin</div>
          <div class="hud-value" id="player-spin">100%</div>
          <div class="hud-bar-wrap"><div class="hud-bar" id="player-bar" style="width:100%"></div></div>
        </div>
      </div>

      <div id="campaign-hud" class="campaign-hud hidden" aria-live="polite"></div>

      <div class="hud-panel hud-side-ai">
        <img class="hud-avatar" id="ai-avatar" src="pegasusLogo.png" alt="" />
        <div class="hud-info">
          <div class="hud-label" id="ai-hud-label">Rival · Spin</div>
          <div class="hud-value" id="ai-spin">100%</div>
          <div class="hud-bar-wrap"><div class="hud-bar" id="ai-bar" style="width:100%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tilt-hint">Tilt phone to steer · Tap a move button to unleash a gimmick</div>

  <div id="player-abilities" class="ability-bar ability-bar-right"></div>

  <div id="special-flash"><img id="special-flash-img" alt="" /></div>

  <div id="select-overlay">
    <div id="play-setup" class="play-setup"></div>
    <div class="select-mount"></div>
    <div class="select-picks" aria-live="polite"></div>
  </div>

  <div id="start-overlay">
    <div class="logo-ring"></div>
    <h1>Spin Sumo</h1>
    <p id="start-blurb">Tournament: best of 3 vs five rivals in rising order.</p>
    <button id="btn-start">Calibrate &amp; Start</button>
    <p id="permission-hint">Requires motion sensor access on iOS. Hold phone flat when starting.</p>
  </div>

  <div id="gameover-overlay">
    <h2 id="gameover-title">KNOCKOUT!</h2>
    <p id="gameover-msg">You win!</p>
    <div class="gameover-actions">
      <button id="btn-restart" type="button">Play Again</button>
      <button id="btn-change-bey" type="button" class="gameover-btn-secondary">Change Bey</button>
      <button id="btn-recalibrate" type="button" class="gameover-btn-secondary">Recalibrate</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>

  <script type="module" src="js/main-mobile.js?v=13"></script>
</body>
</html>
